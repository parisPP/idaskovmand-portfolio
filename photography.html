<script>
  // 1. Matches the IDs defined in the layout slots above perfectly
  document.getElementById('photo-bio-placeholder').innerHTML = sharedBiographyHTML;
  document.getElementById('photo-dama-placeholder').innerHTML = sharedDamaHTML;
  document.getElementById('photo-writing-placeholder').innerHTML = sharedWritingHTML;

  // 2. Active Display Manager Logic
  function handlePhotographyOverlay() {
    const hash = window.location.hash;
    
    const about = document.getElementById('about');
    const dama = document.getElementById('dama');
    const writing = document.getElementById('writing');

    if (!hash) {
      if (about) about.classList.remove('is-visible');
      if (dama) dama.classList.remove('is-visible');
      if (writing) writing.classList.remove('is-visible');
      document.body.style.overflow = ''; 
      return;
    }

    if (hash === '#about') {
      if (about) about.classList.add('is-visible');
      if (dama) dama.classList.remove('is-visible'); 
      if (writing) writing.classList.remove('is-visible');
      document.body.style.overflow = 'hidden'; 
    } 
    
    if (hash === '#dama') {
      if (about) about.classList.add('is-visible');  
      if (dama) dama.classList.add('is-visible');   
      if (writing) writing.classList.remove('is-visible');
      document.body.style.overflow = 'hidden'; 
    }

    if (hash === '#writing') {
      if (about) about.classList.add('is-visible');
      if (writing) writing.classList.add('is-visible');
      if (dama) dama.classList.remove('is-visible');
      document.body.style.overflow = 'hidden';
    }
  }

  // 3. Close Button Handler
  document.querySelectorAll('.page-overlay .close-popup-btn').forEach(button => {
    button.addEventListener('click', () => {
      const isLayeredCard = button.closest('#dama') || button.closest('#writing');
      if (isLayeredCard) {
        window.location.hash = '#about';
      } else {
        history.pushState("", document.title, window.location.pathname + window.location.search);
      }
      handlePhotographyOverlay();
    });
  });

  window.addEventListener('hashchange', handlePhotographyOverlay);
  window.addEventListener('DOMContentLoaded', handlePhotographyOverlay);
</script>
